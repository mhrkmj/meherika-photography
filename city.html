    // Read city from URL param
    const params = new URLSearchParams(window.location.search);
    const cityKey = params.get("city") || "savannah";
    const city = cityData[cityKey] || cityData.savannah;

    document.title = city.name + " — Meherika's Photography";
    document.getElementById("city-title").textContent = city.name;
    document.getElementById("city-desc").textContent = city.desc;

    // Build masonry grid
    const grid = document.getElementById("masonry-grid");
    city.photos.forEach((photo, i) => {
      const item = document.createElement("div");
      item.className = "masonry-item";
      item.innerHTML = `<img src="${photo.url}" alt="${photo.caption}" loading="lazy" />`;
      item.addEventListener("click", () => openLightbox(i));
      grid.appendChild(item);
    });

    // Lightbox logic
    let currentIndex = 0;
    const lightbox = document.getElementById("lightbox");
    const lbImg = document.getElementById("lb-img");
    const lbCaption = document.getElementById("lb-caption");

    function openLightbox(index) {
      currentIndex = index;
      lbImg.src = city.photos[index].url;
      lbCaption.textContent = city.photos[index].caption;
      lightbox.classList.add("open");
      document.body.style.overflow = "hidden";
    }

    function closeLightbox() {
      lightbox.classList.remove("open");
      document.body.style.overflow = "";
    }

    document.getElementById("lb-close").addEventListener("click", closeLightbox);
    document.getElementById("lb-prev").addEventListener("click", () => {
      currentIndex = (currentIndex - 1 + city.photos.length) % city.photos.length;
      openLightbox(currentIndex);
    });
    document.getElementById("lb-next").addEventListener("click", () => {
      currentIndex = (currentIndex + 1) % city.photos.length;
      openLightbox(currentIndex);
    });
    lightbox.addEventListener("click", (e) => {
      if (e.target === lightbox) closeLightbox();
    });
    document.addEventListener("keydown", (e) => {
      if (!lightbox.classList.contains("open")) return;
      if (e.key === "Escape") closeLightbox();
      if (e.key === "ArrowLeft") document.getElementById("lb-prev").click();
      if (e.key === "ArrowRight") document.getElementById("lb-next").click();
    });

    // Hamburger nav
    const toggle = document.getElementById('nav-toggle');
    const navLinks = document.getElementById('nav-links');
    toggle.addEventListener('click', () => {
      toggle.classList.toggle('open');
      navLinks.classList.toggle('open');
    });

    // Swipe support for lightbox
    let touchStartX = 0;
    lightbox.addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
    }, { passive: true });
    lightbox.addEventListener('touchend', (e) => {
      const diff = touchStartX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 50) {
        if (diff > 0) document.getElementById('lb-next').click();
        else document.getElementById('lb-prev').click();
      }
    }, { passive: true });
